services:
  - type: web
    name: chuchutea-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chuchutea-db
          property: connectionString
      - key: LLM_PROVIDER
        value: doubao
      - key: DOUBAO_API_KEY
        sync: false
      - key: DOUBAO_VISION_MODEL
        value: doubao-seed-1-6-251015

databases:
  - name: chuchutea-db
    plan: free
    postgresMajorVersion: 16
