services:
  db:
    image: pgvector/pgvector:pg16
    container_name: chuchutea-db
    environment:
      POSTGRES_USER: chuchutea
      POSTGRES_PASSWORD: chuchutea
      POSTGRES_DB: chuchutea
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chuchutea"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: chuchutea-api
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://chuchutea:chuchutea@db:5432/chuchutea
      TEXT_MODEL: doubao
      DOUBAO_VISION_MODEL: doubao-seed-1-6-251015
      DOUBAO_EMBEDDING_MODEL: doubao-embedding-vision-251215
      DEBUG: "false"

volumes:
  pgdata:
