services:
  db:
    image: pgvector/pgvector:pg16
    container_name: teammind-db
    environment:
      POSTGRES_USER: teammind
      POSTGRES_PASSWORD: teammind
      POSTGRES_DB: teammind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teammind"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
